<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉcoMots — Learn French Ecology Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3a2a;
    --moss: #2d5a3d;
    --fern: #4a8c5c;
    --leaf: #6dbf7e;
    --lime: #a8e063;
    --sky: #c8f5e0;
    --earth: #8b5e3c;
    --sun: #f0c040;
    --water: #4fc3d0;
    --bark: #5c3d1e;
    --cream: #f5f0e8;
    --wrong: #e05555;
    --correct: #4caf50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--forest);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background leaves */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .leaf-bg {
    position: absolute;
    font-size: 2rem;
    opacity: 0.08;
    animation: floatLeaf linear infinite;
  }
  @keyframes floatLeaf {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.08; }
    90% { opacity: 0.08; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* Layout */
  #app {
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 32px 0 20px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    color: var(--lime);
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  header p {
    color: var(--sky);
    font-size: 1rem;
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 12px 20px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .score-item { text-align: center; }
  .score-label { font-size: 0.65rem; color: var(--sky); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .score-val { font-size: 1.6rem; font-weight: 800; color: var(--lime); line-height: 1; }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--leaf), var(--lime));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px var(--lime);
  }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: rgba(255,255,255,0.06);
    padding: 6px;
    border-radius: 14px;
  }
  .mode-tab {
    flex: 1;
    padding: 10px 6px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--sky);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mode-tab.active {
    background: var(--fern);
    color: var(--lime);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .mode-tab:hover:not(.active) { background: rgba(255,255,255,0.08); color: var(--cream); }

  /* Game card */
  .card {
    background: linear-gradient(145deg, rgba(45,90,61,0.6), rgba(26,58,42,0.8));
    border: 1px solid rgba(109,191,126,0.2);
    border-radius: 24px;
    padding: 32px 28px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(168,224,99,0.12), transparent 70%);
    pointer-events: none;
  }

  /* Question */
  .question-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--leaf);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--cream);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.3;
  }
  .question-emoji {
    font-size: 2.8rem;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* MCQ options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .option-btn {
    padding: 16px 14px;
    border: 2px solid rgba(109,191,126,0.25);
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    color: var(--cream);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(109,191,126,0.15);
    border-color: var(--leaf);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .option-btn.correct {
    background: rgba(76,175,80,0.3);
    border-color: var(--correct);
    color: #a8ffab;
    animation: correctPop 0.4s ease;
  }
  .option-btn.wrong {
    background: rgba(224,85,85,0.25);
    border-color: var(--wrong);
    color: #ffaaaa;
    animation: shake 0.4s ease;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Type-in input */
  .type-wrap { width: 100%; }
  .type-input {
    width: 100%;
    padding: 16px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(109,191,126,0.3);
    border-radius: 14px;
    color: var(--cream);
    outline: none;
    transition: all 0.2s;
    margin-bottom: 12px;
    text-align: center;
  }
  .type-input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
  .type-input:focus { border-color: var(--leaf); background: rgba(109,191,126,0.08); }
  .type-input.correct { border-color: var(--correct); background: rgba(76,175,80,0.15); color: #a8ffab; }
  .type-input.wrong { border-color: var(--wrong); background: rgba(224,85,85,0.15); color: #ffaaaa; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--fern), var(--moss));
    border: none;
    border-radius: 14px;
    color: var(--lime);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .submit-btn:hover { background: linear-gradient(135deg, var(--leaf), var(--fern)); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .submit-btn:active { transform: translateY(0); }

  /* Flashcard flip */
  .flashcard-scene { width: 100%; perspective: 1000px; }
  .flashcard-inner {
    width: 100%; min-height: 180px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .flashcard-inner.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 20px;
    padding: 28px;
    text-align: center;
    min-height: 180px;
  }
  .flashcard-front {
    background: linear-gradient(135deg, rgba(74,140,92,0.4), rgba(45,90,61,0.6));
    border: 2px solid rgba(109,191,126,0.3);
  }
  .flashcard-back {
    background: linear-gradient(135deg, rgba(79,195,208,0.2), rgba(26,58,42,0.7));
    border: 2px solid rgba(79,195,208,0.4);
    transform: rotateY(180deg);
  }
  .flashcard-hint {
    font-size: 0.7rem;
    color: var(--leaf);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  .flashcard-word {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--cream);
    line-height: 1.2;
  }
  .flashcard-translation {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--water);
    margin-bottom: 8px;
  }
  .flashcard-example {
    font-size: 0.82rem;
    color: var(--sky);
    opacity: 0.7;
    font-style: italic;
    margin-top: 6px;
  }
  .flip-hint {
    margin-top: 14px;
    color: var(--leaf);
    font-size: 0.75rem;
    opacity: 0.6;
    font-weight: 600;
  }
  .nav-btns {
    display: flex; gap: 12px; margin-top: 16px; width: 100%;
  }
  .nav-btn {
    flex: 1; padding: 12px;
    border: 2px solid rgba(109,191,126,0.25);
    border-radius: 12px;
    background: transparent;
    color: var(--sky);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .nav-btn:hover { background: rgba(109,191,126,0.12); border-color: var(--leaf); color: var(--lime); }

  /* Feedback toast */
  .feedback {
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 1rem;
    margin-top: 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }
  .feedback.show { opacity: 1; transform: translateY(0); }
  .feedback.good { background: rgba(76,175,80,0.2); color: #a8ffab; border: 1px solid rgba(76,175,80,0.4); }
  .feedback.bad { background: rgba(224,85,85,0.15); color: #ffaaaa; border: 1px solid rgba(224,85,85,0.3); }

  /* Next btn */
  .next-btn {
    margin-top: 16px;
    padding: 12px 36px;
    background: linear-gradient(135deg, var(--lime), var(--leaf));
    border: none;
    border-radius: 99px;
    color: var(--forest);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
    display: none;
    letter-spacing: 1px;
    box-shadow: 0 6px 20px rgba(168,224,99,0.3);
  }
  .next-btn.show { display: inline-block; animation: fadeUp 0.3s ease forwards; }
  .next-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 12px 30px rgba(168,224,99,0.4); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* End screen */
  .end-screen {
    text-align: center;
    padding: 20px 0;
  }
  .end-emoji { font-size: 5rem; margin-bottom: 12px; }
  .end-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--lime);
    margin-bottom: 8px;
  }
  .end-score { font-size: 1.2rem; color: var(--sky); margin-bottom: 24px; font-weight: 700; }
  .restart-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--lime), var(--leaf));
    border: none;
    border-radius: 99px;
    color: var(--forest);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1px;
    box-shadow: 0 6px 24px rgba(168,224,99,0.35);
  }
  .restart-btn:hover { transform: translateY(-3px) scale(1.05); }

  /* Responsive */
  @media(max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .card { padding: 24px 18px; }
  }
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div id="app">
  <header>
    <div style="font-size:2.2rem; margin-bottom:8px;">🌿</div>
    <h1>ÉcoMots</h1>
    <p>French Ecology Vocabulary</p>
  </header>

  <div class="scorebar">
    <div class="score-item"><div class="score-label">Score</div><div class="score-val" id="scoreVal">0</div></div>
    <div class="score-item"><div class="score-label">Streak 🔥</div><div class="score-val" id="streakVal">0</div></div>
    <div class="score-item"><div class="score-label">Done</div><div class="score-val" id="doneVal">0/0</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('mcq')">🎯 Quiz</button>
    <button class="mode-tab" onclick="setMode('type')">⌨️ Type It</button>
    <button class="mode-tab" onclick="setMode('flash')">🃏 Flashcards</button>
  </div>

  <div class="card" id="gameCard">
    <div id="gameContent"></div>
  </div>

  <div class="feedback" id="feedback"></div>
  <div style="text-align:center">
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>
</div>

<script>
const VOCAB = [
  { fr: "améliorer", en: "to improve", emoji: "⬆️" },
  { fr: "développer", en: "to develop", emoji: "🌱" },
  { fr: "gaspiller", en: "to waste", emoji: "🗑️" },
  { fr: "polluer", en: "to pollute", emoji: "🏭" },
  { fr: "préserver", en: "to preserve", emoji: "🛡️" },
  { fr: "prévenir l'incendie", en: "to prevent fires", emoji: "🔥" },
  { fr: "proposer une solution", en: "to propose a solution", emoji: "💡" },
  { fr: "recycler", en: "to recycle", emoji: "♻️" },
  { fr: "sauver la planète", en: "to save the planet", emoji: "🌍" },
  { fr: "une catastrophe nucléaire", en: "catastrophe / nuclear power plant", emoji: "☢️" },
  { fr: "le covoiturage", en: "carpooling", emoji: "🚗" },
  { fr: "un danger", en: "danger / threat", emoji: "⚠️" },
  { fr: "des déchets toxiques", en: "toxic waste", emoji: "☠️" },
  { fr: "l'écologie", en: "ecology", emoji: "🌿" },
  { fr: "l'effet de serre", en: "greenhouse effect", emoji: "🌡️" },
  { fr: "un emballage en plastique", en: "plastic wrapping / packaging", emoji: "🧴" },
  { fr: "l'énergie nucléaire", en: "nuclear energy", emoji: "⚡" },
  { fr: "l'énergie solaire", en: "solar energy", emoji: "☀️" },
  { fr: "l'environnement", en: "environment", emoji: "🌲" },
  { fr: "le gaspillage", en: "waste", emoji: "🗑️" },
  { fr: "un glissement de terrain", en: "landslide", emoji: "⛰️" },
  { fr: "un nuage de pollution", en: "pollution cloud", emoji: "🌫️" },
  { fr: "la pluie acide", en: "acid rain", emoji: "🌧️" },
  { fr: "la pollution", en: "air pollution", emoji: "💨" },
  { fr: "une population croissante", en: "growing population", emoji: "👥" },
  { fr: "un produit", en: "product", emoji: "📦" },
  { fr: "la protection", en: "protection", emoji: "🛡️" },
  { fr: "le ramassage des ordures", en: "garbage collection", emoji: "🚛" },
  { fr: "le réchauffement de la Terre", en: "global warming", emoji: "🌡️" },
  { fr: "le recyclage", en: "recycling", emoji: "♻️" },
  { fr: "la surpopulation", en: "overpopulation", emoji: "🏙️" },
  { fr: "le trou dans la couche d'ozone", en: "hole in the ozone layer", emoji: "🕳️" },
  { fr: "une usine", en: "factory", emoji: "🏭" },
  { fr: "écologique", en: "ecological", emoji: "🍃" },
];

let mode = 'mcq';
let shuffled = [];
let current = 0;
let score = 0;
let streak = 0;
let answered = false;
let flashIdx = 0;
let flashFlipped = false;

// Background leaves
const bgLayer = document.getElementById('bgLayer');
const leafChars = ['🌿','🍃','🌱','🍂','🌾','☘️'];
for (let i = 0; i < 18; i++) {
  const el = document.createElement('div');
  el.className = 'leaf-bg';
  el.textContent = leafChars[Math.floor(Math.random()*leafChars.length)];
  el.style.left = Math.random()*100 + 'vw';
  el.style.animationDuration = (12 + Math.random()*20) + 's';
  el.style.animationDelay = -(Math.random()*30) + 's';
  el.style.fontSize = (1.2 + Math.random()*1.8) + 'rem';
  bgLayer.appendChild(el);
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['mcq','type','flash'][i] === m);
  });
  answered = false;
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('feedback').classList.remove('show');
  if (m === 'flash') {
    flashIdx = 0;
    flashFlipped = false;
    renderFlash();
  } else {
    shuffled = shuffle(VOCAB);
    current = 0;
    render();
  }
}

function init() {
  shuffled = shuffle(VOCAB);
  updateScore();
  render();
}

function updateScore() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = streak;
  if (mode !== 'flash') {
    document.getElementById('doneVal').textContent = current + '/' + shuffled.length;
    document.getElementById('progressFill').style.width = (current / shuffled.length * 100) + '%';
  } else {
    document.getElementById('doneVal').textContent = (flashIdx+1) + '/' + VOCAB.length;
    document.getElementById('progressFill').style.width = ((flashIdx+1) / VOCAB.length * 100) + '%';
  }
}

function render() {
  if (current >= shuffled.length) { showEnd(); return; }
  answered = false;
  document.getElementById('nextBtn').classList.remove('show');
  const fb = document.getElementById('feedback');
  fb.classList.remove('show');

  const q = shuffled[current];
  updateScore();

  if (mode === 'mcq') renderMCQ(q);
  else if (mode === 'type') renderType(q);
}

function renderMCQ(q) {
  // Randomly ask fr→en or en→fr
  const frToEn = Math.random() > 0.5;
  const prompt = frToEn ? q.fr : q.en;
  const answer = frToEn ? q.en : q.fr;
  const answerKey = frToEn ? 'en' : 'fr';

  // Pick 3 random wrong answers
  const others = shuffle(VOCAB.filter(v => v !== q)).slice(0, 3);
  const options = shuffle([answer, ...others.map(v => v[answerKey])]);

  document.getElementById('gameContent').innerHTML = `
    <div class="question-emoji">${q.emoji}</div>
    <div class="question-label">${frToEn ? 'What does this mean?' : 'Translate to French'}</div>
    <div class="question-text">${prompt}</div>
    <div class="options-grid">
      ${options.map(o => `<button class="option-btn" onclick="checkMCQ(this, '${o.replace(/'/g,"\\'")}', '${answer.replace(/'/g,"\\'")}', ${frToEn})">${o}</button>`).join('')}
    </div>
  `;
}

function checkMCQ(btn, chosen, correct, frToEn) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });

  if (chosen === correct) {
    btn.classList.add('correct');
    score += 10 + streak * 2;
    streak++;
    showFeedback(true, '');
  } else {
    btn.classList.add('wrong');
    streak = 0;
    showFeedback(false, `Correct: <strong>${correct}</strong>`);
  }
  updateScore();
  document.getElementById('nextBtn').classList.add('show');
}

function renderType(q) {
  const frToEn = Math.random() > 0.5;
  const prompt = frToEn ? q.fr : q.en;
  const answer = frToEn ? q.en : q.fr;

  document.getElementById('gameContent').innerHTML = `
    <div class="question-emoji">${q.emoji}</div>
    <div class="question-label">${frToEn ? 'Translate to English' : 'Translate to French'}</div>
    <div class="question-text">${prompt}</div>
    <div class="type-wrap">
      <input class="type-input" id="typeInput" placeholder="Type your answer…" autocomplete="off"
        onkeydown="if(event.key==='Enter')submitType('${answer.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', ${frToEn})">
      <button class="submit-btn" onclick="submitType('${answer.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', ${frToEn})">✓ Check</button>
    </div>
  `;
  setTimeout(() => document.getElementById('typeInput').focus(), 100);
}

function submitType(correct, frToEn) {
  if (answered) return;
  answered = true;
  const inp = document.getElementById('typeInput');
  const val = inp.value.trim().toLowerCase();
  const correctLow = correct.toLowerCase();

  // fuzzy: accept if within 1-2 chars or matches key word
  const close = val === correctLow ||
    correctLow.includes(val) && val.length > 3 ||
    val.includes(correctLow.split(' ')[0]) && correctLow.split(' ')[0].length > 3;

  inp.disabled = true;
  document.querySelector('.submit-btn').disabled = true;

  if (close) {
    inp.classList.add('correct');
    inp.value = correct;
    score += 15 + streak * 2;
    streak++;
    showFeedback(true, '');
  } else {
    inp.classList.add('wrong');
    streak = 0;
    showFeedback(false, `Answer: <strong>${correct}</strong>`);
  }
  updateScore();
  document.getElementById('nextBtn').classList.add('show');
}

function renderFlash() {
  flashFlipped = false;
  const q = VOCAB[flashIdx % VOCAB.length];
  updateScore();
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('feedback').classList.remove('show');

  document.getElementById('gameContent').innerHTML = `
    <div class="flashcard-scene">
      <div class="flashcard-inner" id="flashInner" onclick="flipCard()">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-hint">French</div>
          <div style="font-size:2.4rem;margin-bottom:8px">${q.emoji}</div>
          <div class="flashcard-word">${q.fr}</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-hint">English</div>
          <div class="flashcard-translation">${q.en}</div>
          <div class="flashcard-example">${q.emoji}</div>
        </div>
      </div>
    </div>
    <div class="flip-hint">👆 Click card to flip</div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="flashNav(-1)">← Prev</button>
      <button class="nav-btn" onclick="flashNav(1)">Next →</button>
    </div>
  `;
}

function flipCard() {
  flashFlipped = !flashFlipped;
  document.getElementById('flashInner').classList.toggle('flipped', flashFlipped);
}

function flashNav(dir) {
  flashIdx = (flashIdx + dir + VOCAB.length) % VOCAB.length;
  renderFlash();
}

function showFeedback(correct, extra) {
  const fb = document.getElementById('feedback');
  fb.innerHTML = correct
    ? `🌿 ${['Excellent!','Super!','Bravo!','Parfait!','Très bien!'][Math.floor(Math.random()*5)]} +${score > 0 ? (10 + (streak-1)*2) : 10} pts`
    : `🍂 Not quite! ${extra}`;
  fb.className = 'feedback show ' + (correct ? 'good' : 'bad');
}

function nextQuestion() {
  current++;
  render();
}

function showEnd() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('feedback').classList.remove('show');

  const pct = Math.round(score / (shuffled.length * 12) * 100);
  const emoji = pct > 80 ? '🌟' : pct > 50 ? '🌿' : '🌱';
  const msg = pct > 80 ? 'Incredible! You're an eco-expert!' : pct > 50 ? 'Great job, keep growing!' : 'Good start — keep practicing!';

  document.getElementById('gameContent').innerHTML = `
    <div class="end-screen">
      <div class="end-emoji">${emoji}</div>
      <div class="end-title">Round Complete!</div>
      <div class="end-score">Score: <strong>${score}</strong> pts &nbsp;|&nbsp; ${msg}</div>
      <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
    </div>
  `;
}

function restartGame() {
  score = 0; streak = 0; current = 0;
  shuffled = shuffle(VOCAB);
  updateScore();
  render();
}

init();
</script>
</body>
</html>
